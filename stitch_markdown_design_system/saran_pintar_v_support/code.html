/* Bottom Sheet Animation */
@keyframes slideUp {
    from {
        transform: translateY(100%);
        } to {
        transform: translateY(0);
        }
    }
@keyframes fadeIn {
    from {
        opacity: 0;
        } to {
        opacity: 1;
        }
    }

<body class="antialiased min-h-screen flex items-end justify-center sm:items-center relative">
<!-- Scrim (Dark Overlay) -->
<div aria-hidden="true" class="fixed inset-0 bg-inverse-surface/60 backdrop-blur-sm z-40 scrim"></div>
<!-- Bottom Sheet Modal -->
<div class="bottom-sheet bg-surface-card w-full sm:max-w-md sm:rounded-2xl rounded-t-3xl rounded-b-none z-50 p-margin-page flex flex-col gap-gutter-stack shadow-2xl relative">

<!-- Success Icon & Header -->
<div class="flex flex-col items-center text-center mt-4 mb-2">

</div>
</div>
</div>
