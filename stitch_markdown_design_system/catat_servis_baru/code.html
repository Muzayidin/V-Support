<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>

<style>
        /* Custom scrollbar for horizontal chip list if needed */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Remove number input arrows */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] { -moz-appearance: textfield; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-bg text-on-surface font-body-md antialiased pb-24">
<!-- Header (Contextual, replacing TopAppBar for transactional flow) -->
<header class="sticky top-0 z-40 bg-surface shadow-sm px-margin-page h-14 flex items-center gap-4">
<button aria-label="Kembali" class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center w-10 h-10 -ml-2 rounded-full active:bg-surface-container-high">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface">Catat Servis Baru</h1>
</header>
<main class="p-margin-page flex flex-col gap-6">
<!-- Form Section 1: Core Details -->
<section class="flex flex-col gap-4 bg-surface-card p-padding-card rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.02)] border border-surface-container-low">
<!-- Vehicle Dropdown -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="vehicle">Kendaraan</label>
<div class="relative w-full min-h-touch-target-min flex items-center bg-surface-container-lowest border border-outline-variant rounded-lg overflow-hidden focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-shadow">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant pointer-events-none">motorcycle</span>
<select class="w-full h-full pl-10 pr-10 py-2.5 bg-transparent border-none text-on-surface font-body-lg text-body-lg appearance-none focus:ring-0" id="vehicle">
<option value="yamaha_mt07">Yamaha MT-07</option>
<option value="honda_pcx">Honda PCX 160</option>
</select>
<span class="material-symbols-outlined absolute right-3 text-on-surface-variant pointer-events-none">arrow_drop_down</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Date Picker -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="service_date">Tanggal Servis</label>
<div class="relative w-full min-h-touch-target-min flex items-center bg-surface-container-lowest border border-outline-variant rounded-lg overflow-hidden focus-within:border-primary transition-shadow">
<span class="material-symbols-outlined absolute left-3 text-primary pointer-events-none">calendar_today</span>
<input class="w-full h-full pl-10 pr-3 py-2.5 bg-transparent border-none text-on-surface font-body-lg text-body-lg focus:ring-0" id="service_date" type="date" value="2023-10-25"/>
</div>
</div>
<!-- Odometer -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="odometer">Odometer (km)</label>
<div class="relative w-full min-h-touch-target-min flex items-center bg-surface-container-lowest border border-outline-variant rounded-lg overflow-hidden focus-within:border-primary transition-shadow">
<input class="w-full h-full pl-3 pr-10 py-2.5 bg-transparent border-none text-on-surface font-body-lg text-body-lg text-right focus:ring-0 font-odometer-display tracking-tight" id="odometer" pattern="\d*" placeholder="0" type="number" value="12500"/>
<span class="material-symbols-outlined absolute right-3 text-on-surface-variant pointer-events-none opacity-50 text-sm">speed</span>
</div>
</div>
</div>
</section>
<!-- Form Section 2: Components -->
<section class="flex flex-col gap-4">
<h2 class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider pl-1">Pilih Komponen yang Diganti/Diservis</h2>
<div class="flex flex-wrap gap-2" id="chip-container">
<!-- Selected Chip -->
<button class="chip active flex items-center gap-1.5 px-4 py-2 min-h-touch-target-min rounded-full font-label-bold text-label-bold bg-primary-container text-on-primary-container border border-primary transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-[18px]">check</span>
                    Oli Mesin
                </button>
<!-- Unselected Chips -->
<button class="chip flex items-center gap-1.5 px-4 py-2 min-h-touch-target-min rounded-full font-label-bold text-label-bold bg-surface-container-lowest text-on-surface-variant border border-outline-variant transition-all active:scale-95" type="button">
                    Oli Gardan
                </button>
<button class="chip flex items-center gap-1.5 px-4 py-2 min-h-touch-target-min rounded-full font-label-bold text-label-bold bg-surface-container-lowest text-on-surface-variant border border-outline-variant transition-all active:scale-95" type="button">
                    Kampas Rem Depan
                </button>
<button class="chip flex items-center gap-1.5 px-4 py-2 min-h-touch-target-min rounded-full font-label-bold text-label-bold bg-surface-container-lowest text-on-surface-variant border border-outline-variant transition-all active:scale-95" type="button">
                    Kampas Rem Belakang
                </button>
<button class="chip flex items-center gap-1.5 px-4 py-2 min-h-touch-target-min rounded-full font-label-bold text-label-bold bg-surface-container-lowest text-on-surface-variant border border-outline-variant transition-all active:scale-95" type="button">
                    Busi
                </button>
<!-- Selected Chip -->
<button class="chip active flex items-center gap-1.5 px-4 py-2 min-h-touch-target-min rounded-full font-label-bold text-label-bold bg-primary-container text-on-primary-container border border-primary transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-[18px]">check</span>
                    V-Belt
                </button>
</div>
<button class="self-start mt-2 px-4 py-2 text-primary font-label-bold text-label-bold flex items-center gap-2 hover:bg-primary/5 rounded-lg transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">add</span>
                Tambah Komponen Kustom
            </button>
</section>
<!-- Form Section 3: Dynamic Price List -->
<section class="flex flex-col gap-3">
<h2 class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider pl-1">Rincian Biaya</h2>
<div class="bg-surface-card rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.02)] border border-surface-container-low divide-y divide-surface-container-highest" id="price-list">
<!-- Dynamic Row 1 -->
<div class="flex items-center justify-between p-4 gap-4">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">water_drop</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium">Oli Mesin</span>
</div>
<div class="relative w-32 h-10 flex items-center bg-surface-container-lowest border border-outline-variant rounded-md overflow-hidden focus-within:border-primary">
<span class="absolute left-2 text-on-surface-variant font-label-sm text-label-sm">Rp</span>
<input class="w-full h-full pl-8 pr-2 bg-transparent border-none text-on-surface font-body-md text-body-md text-right focus:ring-0" pattern="\d*" type="number" value="120000"/>
</div>
</div>
<!-- Dynamic Row 2 -->
<div class="flex items-center justify-between p-4 gap-4">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">settings</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium">V-Belt</span>
</div>
<div class="relative w-32 h-10 flex items-center bg-surface-container-lowest border border-outline-variant rounded-md overflow-hidden focus-within:border-primary">
<span class="absolute left-2 text-on-surface-variant font-label-sm text-label-sm">Rp</span>
<input class="w-full h-full pl-8 pr-2 bg-transparent border-none text-on-surface font-body-md text-body-md text-right focus:ring-0" pattern="\d*" placeholder="0" type="number"/>
</div>
</div>
</div>
<div class="flex justify-between items-center px-2 pt-2">
<span class="font-body-md text-body-md text-on-surface-variant">Total Estimasi</span>
<span class="font-headline-md text-headline-md text-primary">Rp 120.000</span>
</div>
</section>
</main>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 left-0 w-full bg-surface p-margin-page shadow-[0_-4px_16px_rgba(0,0,0,0.05)] border-t border-surface-container z-50">
<button class="w-full min-h-touch-target-min bg-primary text-on-primary font-label-bold text-label-bold rounded-lg flex items-center justify-center gap-2 active:scale-[0.98] transition-transform duration-200 shadow-sm">
<span class="material-symbols-outlined text-[20px]">save</span>
            Simpan Riwayat Servis
        </button>
</div>
<script>
        // Simple JS for Chip Toggle Interaction Simulation
        document.addEventListener('DOMContentLoaded', () => {
            const chips = document.querySelectorAll('.chip');
            
            chips.forEach(chip => {
                chip.addEventListener('click', function() {
                    const isActive = this.classList.contains('active');
                    
                    if (isActive) {
                        // Deactivate
                        this.classList.remove('active', 'bg-primary-container', 'text-on-primary-container', 'border-primary');
                        this.classList.add('bg-surface-container-lowest', 'text-on-surface-variant', 'border-outline-variant');
                        const icon = this.querySelector('.material-symbols-outlined');
                        if (icon) icon.remove();
                    } else {
                        // Activate
                        this.classList.remove('bg-surface-container-lowest', 'text-on-surface-variant', 'border-outline-variant');
                        this.classList.add('active', 'bg-primary-container', 'text-on-primary-container', 'border-primary');
                        this.insertAdjacentHTML('afterbegin', '<span class="material-symbols-outlined text-[18px]">check</span>');
                    }
                });
            });
        });
    </script>
</body></html>
